{{- if .Values.k8s.pdb.create }}
{{- if .Capabilities.APIVersions.Has "policy/v1" }}
apiVersion: policy/v1
{{- else }}
apiVersion: policy/v1beta1
{{- end }}
kind: PodDisruptionBudget
metadata:
  name: {{ include "categraf.fullname" . }}
  labels:
{{- include "categraf.labels" . | nindent 4 }}
spec:
  {{- if .Values.k8s.pdb.minAvailable }}
  minAvailable: {{ .Values.k8s.pdb.minAvailable }}
  {{- end }}
  {{- if .Values.k8s.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.k8s.pdb.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      app: rollouts-categraf
      app.kubernetes.io/name: {{ include "categraf.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
